# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/jobtracker
spring.datasource.username=root
spring.datasource.password=Tanisha@2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Optional - log SQL statements nicely in console
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

# Optional: Configure Hikari connection pool (default in Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# JWT secret key (Base64 encoded, minimum 256-bit for HS256)
jwt.secret=myVerySecretKeyThatIsLongEnoughForHS256Algorithm123

# Token validity duration (milliseconds)
jwt.expirationMs=3600000   # 1 hour


server.port=8081